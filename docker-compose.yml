version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: debugmate-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: debugmate_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10

  app:
    build: .
    container_name: debugmate-app
    ports:
      - "8080:8080"
    environment:
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-root}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/debugmate_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
