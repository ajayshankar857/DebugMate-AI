<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - DebugMate AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="glass-panel auth-card">
      <div class="text-center mb-4">
        <a href="index.html" class="text-decoration-none">
          <h2 class="text-gradient-cyan-purple d-flex align-items-center justify-content-center gap-2">
            <i class="bi bi-cpu-fill"></i> DebugMate AI
          </h2>
        </a>
        <p class="text-secondary mt-2">Sign in to your senior AI mentoring session</p>
      </div>

      <form id="loginForm">
        <div class="mb-3">
          <label for="username" class="form-label text-secondary small">Username</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0 text-muted" style="border: 1px solid var(--border-color); border-radius: 10px 0 0 10px;"><i class="bi bi-person"></i></span>
            <input type="text" class="form-control glass-input border-start-0" style="border-radius: 0 10px 10px 0;" id="username" placeholder="Enter username" required>
          </div>
        </div>

        <div class="mb-4">
          <label for="password" class="form-label text-secondary small">Password</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0 text-muted" style="border: 1px solid var(--border-color); border-radius: 10px 0 0 10px;"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control glass-input border-start-0" style="border-radius: 0 10px 10px 0;" id="password" placeholder="Enter password" required>
          </div>
        </div>

        <button type="submit" class="btn btn-glow-primary w-100 mb-3" id="submitBtn">
          <span class="spinner-border spinner-border-sm d-none me-2" role="status" aria-hidden="true" id="loadingSpinner"></span>
          Sign In
        </button>

        <div class="text-center">
          <p class="small text-secondary mb-0">Don't have an account? <a href="register.html" class="text-gradient text-decoration-none fw-bold">Sign Up</a></p>
        </div>
      </form>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    // Guard page: if already logged in, redirect to index
    Auth.guardPage(false);

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const submitBtn = document.getElementById('submitBtn');
      const spinner = document.getElementById('loadingSpinner');

      const loginData = {
        username: usernameInput.value.trim(),
        password: passwordInput.value
      };

      // UI feedback loading state
      submitBtn.disabled = true;
      spinner.classList.remove('d-none');

      try {
        const result = await Auth.apiCall('/api/auth/login', {
          method: 'POST',
          body: JSON.stringify(loginData)
        });

        Auth.saveSession(result.token, {
          id: result.id,
          username: result.username,
          email: result.email,
          roles: result.roles
        });

        Auth.showToast(`Welcome back, ${result.username}!`, 'success');
        
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1200);

      } catch (error) {
        Auth.showToast(error.message || 'Login failed. Please check credentials.', 'error');
        submitBtn.disabled = false;
        spinner.classList.add('d-none');
      }
    });
  </script>
</body>
</html>
